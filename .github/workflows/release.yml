# REL-04 — release channel: build self-contained per-OS artifacts and publish them to a
# GitHub Release when a v* tag is pushed. Code signing / notarization is a separate, secrets-gated
# step (see docs/release.md) and is intentionally not wired here.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    name: publish (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (self-contained)
        run: >
          dotnet publish TherionProc/TherionProc.csproj -m:1 -c Release -r ${{ matrix.rid }}
          --self-contained true -p:PublishSingleFile=true -o publish/${{ matrix.rid }}

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath TherionProc-${{ matrix.rid }}.zip

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czf TherionProc-${{ matrix.rid }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TherionProc-${{ matrix.rid }}
          path: |
            TherionProc-${{ matrix.rid }}.zip
            TherionProc-${{ matrix.rid }}.tar.gz
          if-no-files-found: ignore

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TherionProc-${{ matrix.rid }}.zip
            TherionProc-${{ matrix.rid }}.tar.gz
          fail_on_unmatched_files: false
