# REL-04 — release channel: build self-contained per-OS artifacts and publish them to a
# GitHub Release when a v* tag is pushed. Windows and Linux also get a native installer
# (setup.exe via Inno Setup, .deb via dpkg-deb — see /build and docs/release.md). Code signing /
# notarization is a separate, secrets-gated step (see docs/release.md) and is intentionally not wired here.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build the User Guide once (docs/user-guide/*.md -> a single navigable PDF) so it can be both
  # bundled into every OS package (Help ▸ User Guide) and attached to the Release as a download.
  guide:
    name: user guide (pdf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pandoc + XeLaTeX: xelatex is required because the guide contains Unicode glyphs
      # (arrows, box symbols) that pdflatex cannot typeset.
      - name: Install pandoc + XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-fonts-recommended \
            texlive-latex-recommended texlive-latex-extra lmodern

      - name: Build the User Guide PDF
        run: bash build/build-user-guide.sh

      - name: Upload the PDF (workflow artifact for the publish jobs)
        uses: actions/upload-artifact@v4
        with:
          name: user-guide-pdf
          path: ThIDE/Assets/ThIDE-User-Guide.pdf
          if-no-files-found: error

      # The Release body: a templated download table built from the deterministic release-asset URLs
      # (github.com/<owner>/<repo>/releases/download/<tag>/<file>). Portable archives are named by RID
      # (version-less: ThIDE-win-x64.zip); installers embed the version (ThIDE-Setup-<ver>.exe).
      - name: Compose the download table (tags only)
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="$GITHUB_REF_NAME"
          VER="${TAG#v}"                                   # strip leading v -> version for filenames
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          {
            echo 'body<<NOTES_EOF'
            echo '## Downloads'
            echo ''
            echo '| Platform | Download |'
            echo '|----------|----------|'
            echo "| **Windows** — installer | [ThIDE-Setup-${VER}.exe](${BASE}/ThIDE-Setup-${VER}.exe) |"
            echo "| Windows — portable (.zip) | [ThIDE-win-x64.zip](${BASE}/ThIDE-win-x64.zip) |"
            echo "| **Linux** — Debian/Ubuntu (.deb) | [thide_${VER}_amd64.deb](${BASE}/thide_${VER}_amd64.deb) |"
            echo "| Linux — AppImage | [ThIDE-${VER}-x86_64.AppImage](${BASE}/ThIDE-${VER}-x86_64.AppImage) |"
            echo "| Linux — portable (.tar.gz) | [ThIDE-linux-x64.tar.gz](${BASE}/ThIDE-linux-x64.tar.gz) |"
            echo "| **macOS** (Apple Silicon) — portable | [ThIDE-osx-arm64.tar.gz](${BASE}/ThIDE-osx-arm64.tar.gz) |"
            echo "| User Guide (PDF) | [ThIDE-User-Guide.pdf](${BASE}/ThIDE-User-Guide.pdf) |"
            echo ''
            echo '_Self-contained builds — no system .NET runtime required. The full asset list is in the **Assets** section below._'
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      # This is the job that *creates* the Release (it runs before the publish matrix), so the body +
      # generate_release_notes live here — both only take effect at creation. GitHub prepends our
      # download table to the auto-generated "What's Changed". The publish matrix then only attaches
      # files (no body), leaving this intact.
      - name: Create the Release with notes + attach the guide (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          files: ThIDE/Assets/ThIDE-User-Guide.pdf
          fail_on_unmatched_files: false

  publish:
    name: publish (${{ matrix.rid }})
    needs: guide
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Drop the pre-built User Guide PDF into the app assets so the globbed
      # <AvaloniaResource Include="Assets\**" /> bundles it and Help ▸ User Guide can open it in-app.
      - name: Bundle the User Guide PDF
        uses: actions/download-artifact@v4
        with:
          name: user-guide-pdf
          path: ThIDE/Assets

      # Derive the SemVer from the tag (v0.3.0 -> 0.3.0, v0.3.0-beta.1 -> 0.3.0 + beta.1);
      # default for workflow_dispatch. bash is available on all three runners.
      - name: Compute version
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME:-}"
          if [[ "$REF" == v* ]]; then VER="${REF#v}"; else VER="0.0.0"; fi
          PREFIX="${VER%%-*}"                                  # MAJOR.MINOR.PATCH
          if [[ "$VER" == *-* ]]; then SUFFIX="${VER#*-}"; else SUFFIX=""; fi  # pre-release label
          echo "version=$VER"   >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"

      # Feed the tag's version into the build so the shipped binaries' embedded
      # SemVer / FileVersion match the release (freezing the local build counter).
      - name: Publish (self-contained)
        run: >
          dotnet publish ThIDE/ThIDE.csproj -m:1 -c Release -r ${{ matrix.rid }}
          --self-contained true -p:PublishSingleFile=true -o publish/${{ matrix.rid }}
          -p:VersionPrefix=${{ steps.ver.outputs.prefix }} -p:VersionSuffix=${{ steps.ver.outputs.suffix }}
          -p:TherionBuildNumber=0 -p:TherionAutoIncrementBuild=false

      # --- Native installers (Windows + Linux) ---

      - name: Build Windows installer (Inno Setup)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "/DSourceDir=$PWD\publish\win-x64" `
            "/O$PWD" `
            build\windows\ThIDE.iss

      - name: Build Linux installers (.deb + AppImage)
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y icoutils
          bash build/linux/build-deb.sh      publish/linux-x64 "${{ steps.ver.outputs.version }}" "$PWD"
          bash build/linux/build-appimage.sh publish/linux-x64 "${{ steps.ver.outputs.version }}" "$PWD"

      # --- Portable archives (all platforms) ---

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath ThIDE-${{ matrix.rid }}.zip

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ThIDE-${{ matrix.rid }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThIDE-${{ matrix.rid }}
          path: |
            ThIDE-${{ matrix.rid }}.zip
            ThIDE-${{ matrix.rid }}.tar.gz
            ThIDE-Setup-*.exe
            thide_*_amd64.deb
            ThIDE-*-x86_64.AppImage
            ThIDE/Assets/ThIDE-User-Guide.pdf
          if-no-files-found: ignore

      # Attaches this leg's archives/installers to the Release the `guide` job already created.
      # Deliberately sets NO `body` here: the notes/download-table are owned by the guide job, and
      # this step runs 3x in parallel — setting a body here would race and clobber those notes.
      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # A pre-release tag (v0.3.0-beta.1) is flagged as a GitHub pre-release.
          prerelease: ${{ steps.ver.outputs.suffix != '' }}
          files: |
            ThIDE-${{ matrix.rid }}.zip
            ThIDE-${{ matrix.rid }}.tar.gz
            ThIDE-Setup-*.exe
            thide_*_amd64.deb
            ThIDE-*-x86_64.AppImage
          fail_on_unmatched_files: false
