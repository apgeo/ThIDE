<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ThIDE — 3D Model Viewer</title>
<link rel="stylesheet" href="CaveView/css/caveview.css" />
<style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1e1e1e; }
    #scene { position: absolute; inset: 0; }
    #overlay {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #d4d4d4; font: 13px/1.5 "Segoe UI", system-ui, sans-serif; text-align: center;
        padding: 24px; background: #1e1e1e; box-sizing: border-box; pointer-events: none;
    }
    #overlay.hidden { display: none; }
    /* When the host hides CaveView's own menu, suppress its control panel (the left sidebar). */
    #scene.cv-hide-ui .cv-frame { display: none !important; }
</style>
</head>
<body>
<div id="scene" class="cv-container"></div>
<div id="overlay">Loading 3D engine…</div>

<!-- Vendored CaveView.js (MIT). Detector provides WebGL feature detection. -->
<script src="CaveView/lib/Detector.js"></script>
<script src="CaveView/js/CaveView2.js"></script>
<script>
"use strict";
// Host page bridging the embedded CaveView.js viewer to the ThIDE C# shell.
//   C# -> JS : InvokeScript("cvLoadModel('cave.lox')") etc. (functions on window).
//   JS -> C# : window.chrome.webview.postMessage(json)  (NativeWebView WebMessageReceived).
// Every entry point is defensive: the C# side must never see a JS exception turn into a
// blank control, so failures degrade to a status message + an 'error' message back to C#.
(function () {

    var viewer = null;
    var caveUI = null;         // CaveView's own control panel (created lazily on first sidebar-enable)
    var fullscreenActive = false;  // host-managed: forward Esc to exit full screen only while set
    var pendingModel = null;   // a load requested before the viewer finished initialising
    var pendingShading = null;

    // Esc closes full screen even when the web control has keyboard focus (#3). Capture-phase so
    // it runs before CaveView's own handlers; only acts while the host marks us full-screen.
    document.addEventListener("keydown", function (e) {
        if (fullscreenActive && (e.key === "Escape" || e.keyCode === 27)) {
            post({ type: "esc" });
        }
    }, true);

    function post(obj) {
        try {
            var json = JSON.stringify(obj);
            if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
                window.chrome.webview.postMessage(json);
            } else if (window.parent) {
                window.parent.postMessage(json, "*"); // Browser/iframe backend fallback
            }
        } catch (e) { /* never throw from the bridge */ }
    }

    // Forward the page's console output + uncaught errors to the C# Log panel so JS errors and
    // notices are visible even when no dev console is available (a native one is also enabled
    // host-side where the engine supports it — WebView2 F12 / right-click ▸ Inspect).
    function postConsole(level, args) {
        try {
            var parts = [];
            for (var i = 0; i < args.length; i++) {
                var a = args[i];
                if (typeof a === "string") { parts.push(a); }
                else { try { parts.push(JSON.stringify(a)); } catch (e) { parts.push(String(a)); } }
            }
            post({ type: "console", level: level, message: parts.join(" ") });
        } catch (e) { /* never throw from logging */ }
    }
    (function hookConsole() {
        var c = window.console || (window.console = {});
        ["log", "info", "warn", "error"].forEach(function (m) {
            var orig = (typeof c[m] === "function") ? c[m].bind(c) : function () { };
            c[m] = function () { postConsole(m, arguments); orig.apply(c, arguments); };
        });
        window.addEventListener("error", function (e) {
            postConsole("error", [(e && e.message) || "script error", (e && e.filename) || "", (e && e.lineno) || ""]);
        });
        window.addEventListener("unhandledrejection", function (e) {
            var r = e && e.reason;
            postConsole("error", ["unhandled promise rejection: " + ((r && r.message) || r || "")]);
        });
    })();

    function showOverlay(msg) {
        var o = document.getElementById("overlay");
        if (o) { o.textContent = msg; o.classList.remove("hidden"); }
    }
    function hideOverlay() {
        var o = document.getElementById("overlay");
        if (o) o.classList.add("hidden");
    }

    // Maps our toolbar's shading-mode names to CaveView's CV2.SHADING_* constants.
    // DEPTH needs terrain (not loaded here), so it falls back to HEIGHT.
    function shadingFromName(name) {
        switch (String(name || "").toLowerCase()) {
            case "height":      return CV2.SHADING_HEIGHT;
            case "survey":      return CV2.SHADING_SURVEY;
            case "length":      return CV2.SHADING_LENGTH;
            case "inclination": return CV2.SHADING_INCLINATION;
            case "single":      return CV2.SHADING_SINGLE;
            case "depth":       return (CV2.SHADING_DEPTH !== undefined) ? CV2.SHADING_DEPTH : CV2.SHADING_HEIGHT;
            default:            return CV2.SHADING_HEIGHT;
        }
    }

    // ---- C# -> JS API (invoked via NativeWebView.InvokeScript) ----

    window.cvLoadModel = function (file) {
        if (!file) return;
        if (!viewer) { pendingModel = file; return; }
        try {
            hideOverlay();
            viewer.clearView();
            viewer.loadCave(file);
        } catch (e) { post({ type: "error", message: String(e) }); }
    };

    window.cvSetShading = function (name) {
        if (!viewer) { pendingShading = name; return; }
        try { viewer.shadingMode = shadingFromName(name); } catch (e) { /* ignore */ }
    };

    // Select a station or survey by its full dotted path (outer.inner.point). For a station
    // CaveView highlights the point; for a survey it shows the bounding box — both native.
    window.cvSelect = function (name) {
        if (!viewer || !name) return;
        try { viewer.sectionByName = String(name); } catch (e) { /* ignore */ }
    };

    window.cvResetView = function () {
        if (!viewer) return;
        try { viewer.resetView(); } catch (e) { /* ignore */ }
    };

    // ---- external control bar (mirrors the speosilex.ro reference viewer) ----
    // The C# shell drives all of these after the page reports 'ready', and re-asserts the full
    // control state on each load, so every entry point can safely no-op until the viewer exists.

    // Orientation: plan + the four elevation profiles (north/south/east/west).
    window.cvSetView = function (name) {
        if (!viewer) return;
        try {
            var map = {
                none:  CV2.VIEW_NONE,  plan:  CV2.VIEW_PLAN,
                north: CV2.VIEW_ELEVATION_N, south: CV2.VIEW_ELEVATION_S,
                east:  CV2.VIEW_ELEVATION_E, west:  CV2.VIEW_ELEVATION_W
            };
            var v = map[String(name || "").toLowerCase()];
            if (v !== undefined) viewer.view = v;
        } catch (e) { /* ignore */ }
    };

    // Camera projection: perspective vs orthographic.
    window.cvSetCamera = function (name) {
        if (!viewer) return;
        try {
            viewer.cameraType = String(name || "").toLowerCase() === "orthographic"
                ? CV2.CAMERA_ORTHOGRAPHIC : CV2.CAMERA_PERSPECTIVE;
        } catch (e) { /* ignore */ }
    };

    // Generic boolean feature toggle (walls/splays/surface/stations/labels/names/box/autorotate/light/hud).
    window.cvToggle = function (feature, on) {
        if (!viewer) return;
        on = !!on;
        try {
            switch (String(feature || "").toLowerCase()) {
                case "walls":      viewer.walls = on; break;
                case "splays":     viewer.splays = on; break;
                case "surface":    viewer.surfaceLegs = on; break;
                case "stations":   viewer.stations = on; break;
                case "labels":     viewer.stationLabels = on; break;
                case "names":      viewer.entrances = on; break;
                case "box":        viewer.box = on; break;
                case "autorotate": viewer.autoRotate = on; break;
                case "light":      viewer.terrainDirectionalLighting = on; break;
                case "hud":        viewer.HUD = on; break;
            }
        } catch (e) { /* ignore */ }
    };

    // CaveView's own full menu (the left sidebar). Created lazily, then shown/hidden via CSS.
    window.cvSetSidebar = function (on) {
        if (!viewer) return;
        try {
            if (on && !caveUI && typeof CV2.CaveViewUI === "function") caveUI = new CV2.CaveViewUI(viewer);
            var scene = document.getElementById("scene");
            if (scene) scene.classList.toggle("cv-hide-ui", !on);
        } catch (e) { /* ignore */ }
    };

    // Re-fit the WebGL canvas to its container (CaveView only re-fits on a window 'resize').
    // Called by the host after a layout change it can't observe (e.g. the full-screen reparent).
    window.cvResize = function () {
        try { window.dispatchEvent(new Event("resize")); } catch (e) { /* ignore */ }
    };

    // Unload the current model so a workspace/thconfig switch doesn't leave a stale cave on screen.
    window.cvClear = function () {
        try { if (viewer) viewer.clearView(); } catch (e) { /* ignore */ }
        showOverlay("Build a 3D model (.lox / .3d) to view it here.");
    };

    // The host tells us when the panel is full-screen so we can forward Esc (the web control
    // otherwise swallows it before C# sees the key) to close full screen.
    window.cvSetFullscreen = function (on) { fullscreenActive = !!on; };

    // ---- JS -> C# : station pick ----
    function onStation(e) {
        try {
            var n = e && e.node;
            if (!n) return;
            var name = (typeof n.name === "function") ? n.name() : (n.name || "");
            var c = (typeof n.coordinates === "function") ? n.coordinates() : null;
            post({
                type: "station",
                station: name,
                x: c ? c.x : 0, y: c ? c.y : 0, z: c ? c.z : 0
            });
        } catch (err) { post({ type: "error", message: String(err) }); }
    }

    function init() {
        if (typeof CV2 === "undefined") {
            showOverlay("The 3D engine (CaveView.js) could not be loaded.");
            post({ type: "error", message: "CV2 missing" });
            return;
        }
        if (typeof Detector !== "undefined" && !Detector.webgl) {
            showOverlay("WebGL is not available in this web engine, so the 3D model can't be shown.");
            post({ type: "error", message: "no-webgl" });
            return;
        }
        try {
            viewer = new CV2.CaveViewer("scene", {
                home: "CaveView/",
                surveyDirectory: "model/",
                view: {
                    shadingMode: CV2.SHADING_HEIGHT,
                    box: true,
                    HUD: !false,        // ThIDE supplies its own toolbar
                    entrances: true,
                    walls: !false
                }
            });

            viewer.addEventListener("newCave", function () { hideOverlay(); post({ type: "loaded" }); });
            viewer.addEventListener("station", onStation);

            // Keep the WebGL canvas fitted to the panel. CaveView only re-fits on a window 'resize',
            // which doesn't reliably fire when the host *control* (not the OS window) is resized — e.g.
            // dragging the dock splitter or entering full screen. Drive it from a ResizeObserver.
            try {
                if (typeof ResizeObserver === "function") {
                    var scene = document.getElementById("scene");
                    var ro = new ResizeObserver(function () { window.dispatchEvent(new Event("resize")); });
                    if (scene) ro.observe(scene);
                }
            } catch (e) { /* best-effort fit */ }

            post({ type: "ready" });

            if (pendingShading) { window.cvSetShading(pendingShading); pendingShading = null; }
            if (pendingModel) { var f = pendingModel; pendingModel = null; window.cvLoadModel(f); }
            else showOverlay("Build a 3D model (.lox / .3d) to view it here.");
        } catch (e) {
            showOverlay("Could not start the 3D viewer: " + String(e));
            post({ type: "error", message: String(e) });
        }
    }

    if (document.readyState === "complete" || document.readyState === "interactive") init();
    else window.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
